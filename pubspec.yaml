name: namaz
description: "A cross-platform Flutter app for tracking Salah with streaks and daily quotes."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.1.2
  geolocator: ^11.0.0
  adhan: ^2.0.0+1
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  intl: ^0.19.0
  timezone: ^0.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
